        function showStoryModal(show) {
            const modal = document.getElementById('story-modal');
            if (show) {
                modal.classList.add('show');
            } else {
                modal.classList.remove('show');
            }
        }

        function showStoryViewerModal(show) {
            if (!show) {
                state.viewingStory = null;
                state.storyIndex = 0;
            }
            render();
        }

        function showPollModal() {
            state.showPollModal = true;
            render();
        }

        function showLiveModal() {
            state.showLiveModal = true;
            render();
        }

        function startLiveStreamPrompt() {
            const title = prompt('Enter your live stream title:');
            if (title && title.trim()) {
                startLiveStream(title.trim());
                render();
            }
        }

        function addPollOption() {
            const optionsContainer = document.getElementById('poll-options');
            const optionDiv = document.createElement('div');
            optionDiv.className = 'flex gap-2 mb-2';
            optionDiv.innerHTML = `
                <input type="text" placeholder="Option ${optionsContainer.children.length + 1}" class="flex-1 p-3 bg-gray-100 dark:bg-gray-800 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="removePollOption(this)" class="p-3 bg-red-500 text-white rounded-lg hover:bg-red-600">✕</button>
            `;
            optionsContainer.appendChild(optionDiv);
        }

        function removePollOption(button) {
            const optionDiv = button.parentElement;
            if (document.querySelectorAll('#poll-options > div').length > 2) {
                optionDiv.remove();
            }
        }

        function createPollFromModal() {
            const question = document.getElementById('poll-question').value.trim();
            const duration = parseInt(document.getElementById('poll-duration').value);
            const optionInputs = document.querySelectorAll('#poll-options input');
            const options = Array.from(optionInputs).map(input => input.value.trim()).filter(option => option);

            if (!question || options.length < 2) {
                alert('Please enter a question and at least 2 options');
                return;
            }

            const poll = createPoll(question, options, duration);
            const post = createPost(question, 'poll', null, null);
            post.poll = poll;

            state.showPollModal = false;
            render();
        }

        function startLiveFromModal() {
            const title = document.getElementById('live-title').value.trim();
            if (!title) {
                alert('Please enter a stream title');
                return;
            }

            startLiveStream(title);
            state.showLiveModal = false;
            render();
        }

        function publishStory() {
            const text = document.getElementById('story-text').value.trim();
            const mediaData = window.storyMediaData;
            const mediaType = window.storyMediaType || 'text';
            const pollQuestion = document.getElementById('story-poll-question').value.trim();
            const pollOptions = Array.from(document.querySelectorAll('.story-poll-option'))
                .map(input => input.value.trim())
                .filter(option => option);

            if (!text && !mediaData && !pollQuestion) return;

            const poll = pollQuestion && pollOptions.length >= 2 ? createPoll(pollQuestion, pollOptions, 24) : null;
            createStory(text, mediaData, mediaType, poll);
            document.getElementById('story-text').value = '';
            document.getElementById('story-poll-question').value = '';
            document.querySelectorAll('.story-poll-option').forEach(input => input.value = '');
            document.getElementById('story-media-preview').innerHTML = '';
            window.storyMediaData = null;
            window.storyMediaType = null;
            showStoryModal(false);
            render();
        }

        function viewStory(storyId) {
            const story = state.stories.find(s => s.id === storyId);
            if (story) {
                state.viewingStory = story;
                state.storyIndex = getUserStories(story.author.id).findIndex(s => s.id === storyId);
                if (!story.views.includes(state.currentUser.id)) {
                    story.views.push(state.currentUser.id);
                    saveState();
                }
                render();
            }
        }

        function viewUserStories(userId) {
            const userStories = getUserStories(userId);
            if (userStories.length > 0) {
                state.viewingStory = userStories[0];
                state.storyIndex = 0;
                if (!userStories[0].views.includes(state.currentUser.id)) {
                    userStories[0].views.push(state.currentUser.id);
                    saveState();
                }
                render();
            }
        }

        function prevStory() {
            if (state.storyIndex > 0) {
                state.storyIndex--;
                const userStories = getUserStories(state.viewingStory.author.id);
                state.viewingStory = userStories[state.storyIndex];
                viewStory(state.viewingStory.id);
                render();
            }
        }

        function nextStory() {
            const userStories = getUserStories(state.viewingStory.author.id);
            if (state.storyIndex < userStories.length - 1) {
                state.storyIndex++;
                state.viewingStory = userStories[state.storyIndex];
                viewStory(state.viewingStory.id);
                render();
            } else {
                showStoryViewerModal(false);
            }
        }

        function handleStoryMediaUpload(event, type) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const preview = document.getElementById('story-media-preview');
                    if (type === 'video') {
                        preview.innerHTML = `<video src="${e.target.result}" controls class="image-preview"></video>`;
                    } else {
                        preview.innerHTML = `<img src="${e.target.result}" class="image-preview">`;
                    }
                    // Store the media data and type for publishing
                    window.storyMediaData = e.target.result;
                    window.storyMediaType = type;
                };
                reader.readAsDataURL(file);
            }
        }

        function handleStoryReplyKeyPress(event, storyId) {
            if (event.key === 'Enter') {
                submitStoryReply(storyId);
            }
        }

        function submitStoryReply(storyId) {
            const input = document.getElementById('story-reply-input');
            const replyText = input.value.trim();
            if (replyText) {
                replyStory(storyId, replyText);
                input.value = '';
                // Refresh the story viewer to show the new reply
                render();
            }
        }

        function updateCharCount() {
            const textarea = document.getElementById('composer-text');
            if (textarea) {
                const count = 280 - textarea.value.length;
                const counter = document.getElementById('char-count');
                if (counter) {
                    counter.textContent = count;
                    counter.style.color = count < 0 ? '#e0245e' : count < 20 ? '#ffa500' : '#657786';
                }
            }
        }

        function applyDarkMode() {
            if (state.darkMode) {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
            }
        }

        // ===========================
        // RENDER
        // ===========================

        function render() {
            const app = document.getElementById('app');
            if (state.currentUser) {
                app.innerHTML = MainApp();
                setTimeout(() => {
                    const textarea = document.getElementById('composer-text');
                    if (textarea) {
                        textarea.addEventListener('input', updateCharCount);
                    }
                }, 0);
            } else {
                app.innerHTML = LoginScreen();
            }
        }

        // ===========================
        // INITIALIZATION
        // ===========================

        loadState();

        if (state.users.length === 0) {
            register('Demo User', 'demo@example.com', 'password123');
            register('John Developer', 'john@example.com', 'password123');
            register('Jane Designer', 'jane@example.com', 'password123');

            // Add bio to users
            state.users[0].bio = 'Full-stack developer passionate about creating amazing web experiences! 🚀';
            state.users[1].bio = 'Coffee-fueled coder on a mission to build the next big thing ☕💻';
            state.users[2].bio = 'Creative designer turning ideas into beautiful digital experiences 🎨✨';

            state.currentUser = state.users[0];
            createPost('🚀 Welcome to SocialFusion Premium Edition! Now with DMs, comments, profiles & more!', 'text');
            createPost('#React is awesome! Just built this amazing app 💪 #WebDevelopment #JavaScript', 'text');
            
            state.currentUser = state.users[1];
            createPost('Day 1 of my coding journey! #100DaysOfCode #Programming', 'text');
            createPost('Just launched my new design portfolio! Check it out 🎨 #Design #UI', 'text');
            
            state.currentUser = state.users[2];
            createPost('Learning Node.js today! Excited! #Backend #Coding', 'text');

            // Create sample stories
            state.currentUser = state.users[0];
            createStory('Good morning! ☀️ Starting my day with some coding', null, 'text');
            createStory('Working on an amazing new feature! 🚀', null, 'text');
            
            state.currentUser = state.users[1];
            createStory('Coffee and code ☕💻', null, 'text');
            createStory('Beautiful sunset from my window 🌅', 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=600&fit=crop', 'photo');
            
            state.currentUser = state.users[2];
            createStory('Design inspiration everywhere! 🎨', null, 'text');

            // Follow relationships
            state.users[0].following = [state.users[1].id, state.users[2].id];
            state.users[1].followers.push(state.users[0].id);
            state.users[2].followers.push(state.users[0].id);

            state.currentUser = null;
            saveState();
        }

        applyDarkMode();
        render();
    </script>
